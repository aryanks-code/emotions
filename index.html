<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Dictionary</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hidden background element for smooth gradient transitions -->
    <div id="background-layer"></div>

    <main class="app-container">
        
        <!-- STATE 1: Input -->
        <div id="input-section" class="ui-state active">
            <h1 class="title breathing-text">How is your heart today?</h1>
            <div class="input-wrapper">
                <input type="text" id="emotion-input" placeholder="whisper a word, like 'Saudade'..." autocomplete="off" spellcheck="false">
            </div>
            <button id="reveal-btn" class="soft-btn">Reveal Palette</button>
        </div>

        <!-- STATE 2: Transition -->
        <div id="understanding-section" class="ui-state">
            <p class="understanding-text">understanding...</p>
        </div>

        <!-- STATE 3: The Result -->
        <div id="result-section" class="ui-state">
            <div class="palette" id="palette-container">
                <!-- Squares will be generated by JavaScript -->
            </div>
            <p id="result-description" class="description-text"></p>
            
            <button id="reset-btn" class="soft-btn back-btn hidden">Explore Another</button>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
